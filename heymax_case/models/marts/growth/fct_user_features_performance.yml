version: 2

models:
  - name: fct_user_features_performance
    description: >
      Aggregated performance table across all period grains (day, week, month).
      Groups by all dimension columns and aggregates user counts, events, and miles.
      Sourced from int_user_features_daily/weekly/monthly.
    columns:
      - name: reporting_date
        description: Start date of the period. Interpretation depends on period_grain.
        tests:
          - not_null

      - name: period_grain
        description: Grain of the period. One of 'day', 'week', or 'month'.
        tests:
          - not_null
          - accepted_values:
              values: ['day', 'week', 'month']

      - name: user_type
        description: "'new' if this is the user's first ever active period, 'existing' otherwise."
        tests:
          - accepted_values:
              values: ['new', 'existing']

      - name: country
        description: User country derived from events in the period.

      - name: gender
        description: User gender derived from events in the period.

      - name: first_utm_source
        description: First UTM source seen in the period, ordered by event_ts.

      - name: first_event_type
        description: First event type seen in the period, ordered by event_ts.

      - name: first_transaction_category
        description: First transaction category seen in the period, ordered by event_ts.

      - name: first_platform
        description: First platform seen in the period, ordered by event_ts.

      - name: primary_utm_source
        description: Most frequent UTM source in the period by event count.

      - name: primary_event_type
        description: Most frequent event type in the period by event count.

      - name: primary_transaction_category
        description: Most frequent transaction category in the period by event count.

      - name: primary_platform
        description: Most frequent platform in the period by event count.

      - name: users
        description: Count of distinct users in this dimension group.

      - name: event_count
        description: Total number of events across all users in this dimension group.

      - name: miles_earned
        description: Total miles earned across all users in this dimension group.

      - name: miles_redeemed
        description: Total miles redeemed across all users in this dimension group.
