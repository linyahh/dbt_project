name: dbt CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  layer-dependency-check:
    name: Check model layer dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-bigquery
        run: pip install dbt-bigquery

      - name: Install dbt packages
        working-directory: heymax_case
        run: dbt deps

      - name: Generate profiles.yml from secrets
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_DATASET: ${{ secrets.GCP_DATASET }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa_key.json
          mkdir -p /tmp/dbt
          cat > /tmp/dbt/profiles.yml <<EOF
          heymax_case:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: ${GCP_PROJECT_ID}
                dataset: ${GCP_DATASET}
                schema: ${GCP_DATASET}
                keyfile: /tmp/sa_key.json
                threads: 4
                timeout_seconds: 300
          EOF

      - name: Compile dbt project (generates manifest)
        working-directory: heymax_case
        run: dbt compile --profiles-dir /tmp/dbt

      - name: Check layer dependency rules
        run: python ci/check_layer_dependencies.py heymax_case/target/manifest.json

  dbt-tests:
    name: Run dbt tests on changed models
    runs-on: ubuntu-latest
    needs: layer-dependency-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-bigquery
        run: pip install dbt-bigquery

      - name: Install dbt packages
        working-directory: heymax_case
        run: dbt deps

      - name: Generate profiles.yml from secrets
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_DATASET: ${{ secrets.GCP_DATASET }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa_key.json
          mkdir -p /tmp/dbt
          cat > /tmp/dbt/profiles.yml <<EOF
          heymax_case:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: ${GCP_PROJECT_ID}
                dataset: ${GCP_DATASET}
                schema: ${GCP_DATASET}
                keyfile: /tmp/sa_key.json
                threads: 4
                timeout_seconds: 300
          EOF

      - name: Run dbt tests
        working-directory: heymax_case
        run: dbt test --profiles-dir /tmp/dbt --select state:modified+
