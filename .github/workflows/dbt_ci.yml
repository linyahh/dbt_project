name: dbt CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  layer-dependency-check:
    name: Check model layer dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-bigquery
        run: pip install dbt-bigquery

      - name: Install dbt packages
        working-directory: heymax_case
        run: dbt deps

      - name: Generate profiles.yml
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_DATASET: ${{ secrets.GCP_DATASET }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_LOCATION: ${{ secrets.GCP_LOCATION }}
        run: |
          mkdir -p /tmp/dbt
          python - <<'PYEOF'
          import json, os, yaml
          profile = {
              "heymax_case": {
                  "target": "dev",
                  "outputs": {
                      "dev": {
                          "type": "bigquery",
                          "method": "service-account-json",
                          "project": os.environ["GCP_PROJECT_ID"],
                          "dataset": os.environ["GCP_DATASET"],
                          "keyfile_json": json.loads(os.environ["GCP_SA_KEY"]),
                          "location": os.environ.get("GCP_LOCATION", "US"),
                          "threads": 4,
                          "timeout_seconds": 300,
                      }
                  },
              }
          }
          with open("/tmp/dbt/profiles.yml", "w") as f:
              yaml.dump(profile, f, default_flow_style=False)
          print("profiles.yml written successfully")
          PYEOF

      - name: Compile dbt project (generates manifest)
        working-directory: heymax_case
        run: dbt compile --profiles-dir /tmp/dbt

      - name: Check layer dependency rules
        run: python ci/check_layer_dependencies.py heymax_case/target/manifest.json

  dbt-tests:
    name: Run dbt tests on changed models
    runs-on: ubuntu-latest
    needs: layer-dependency-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-bigquery
        run: pip install dbt-bigquery

      - name: Install dbt packages
        working-directory: heymax_case
        run: dbt deps

      - name: Generate profiles.yml
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_DATASET: ${{ secrets.GCP_DATASET }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_LOCATION: ${{ secrets.GCP_LOCATION }}
        run: |
          mkdir -p /tmp/dbt
          python - <<'PYEOF'
          import json, os, yaml
          profile = {
              "heymax_case": {
                  "target": "dev",
                  "outputs": {
                      "dev": {
                          "type": "bigquery",
                          "method": "service-account-json",
                          "project": os.environ["GCP_PROJECT_ID"],
                          "dataset": os.environ["GCP_DATASET"],
                          "keyfile_json": json.loads(os.environ["GCP_SA_KEY"]),
                          "location": os.environ.get("GCP_LOCATION", "US"),
                          "threads": 4,
                          "timeout_seconds": 300,
                      }
                  },
              }
          }
          with open("/tmp/dbt/profiles.yml", "w") as f:
              yaml.dump(profile, f, default_flow_style=False)
          print("profiles.yml written successfully")
          PYEOF

      - name: Run dbt tests
        working-directory: heymax_case
        run: dbt test --profiles-dir /tmp/dbt --select state:modified+
