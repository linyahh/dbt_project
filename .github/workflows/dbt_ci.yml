name: dbt CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  layer-dependency-check:
    name: Check model layer dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-bigquery
        run: pip install dbt-bigquery

      - name: Install dbt packages
        working-directory: heymax_case
        run: dbt deps

      - name: Compile dbt project (generates manifest)
        working-directory: heymax_case
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa_key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa_key.json
          dbt compile --profiles-dir $DBT_PROFILES_DIR

      - name: Check layer dependency rules
        run: python ci/check_layer_dependencies.py heymax_case/target/manifest.json

  dbt-tests:
    name: Run dbt tests on changed models
    runs-on: ubuntu-latest
    needs: layer-dependency-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-bigquery
        run: pip install dbt-bigquery

      - name: Install dbt packages
        working-directory: heymax_case
        run: dbt deps

      - name: Run dbt tests
        working-directory: heymax_case
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa_key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa_key.json
          dbt test --profiles-dir ${{ github.workspace }} --select state:modified+
